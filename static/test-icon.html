    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
    }
    .icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 15px;
      margin-top: 30px;

    .icon-box {
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .icon-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 4px;
    }
    .icon-label {
      font-size: 11px;
      color: #666;
      text-align: center;
      word-break: break-word;
    }
    svg {
      width: 100%;
      height: 100%;
    }
  </style>
