name: Tests

# Runs the existing backend (pytest) and frontend (Playwright) suites on
# every push/PR — this repo had 300+ tests already written but nothing
# running them automatically before this workflow existed, at a commit
# cadence high enough that a regression could easily slip through
# unnoticed without CI.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt

      - name: Run backend tests
        run: .venv/bin/pytest tests/backend -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        # playwright.config.js's webServer launches `.venv/bin/python app.py`
        # directly, so .venv has to exist at exactly that path.
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run frontend tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
